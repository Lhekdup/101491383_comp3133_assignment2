<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
          <h4 class="mb-0">Update Employee</h4>
          <a routerLink="/employees" class="btn btn-sm btn-light">Back to List</a>
        </div>
        <div class="card-body p-4">
          
          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

          <form (ngSubmit)="onSubmit()" #employeeForm="ngForm">
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" name="first_name" [(ngModel)]="employee.first_name" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" name="last_name" [(ngModel)]="employee.last_name" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" [(ngModel)]="employee.email" required email>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Gender</label>
                <select class="form-select" name="gender" [(ngModel)]="employee.gender" required>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Designation</label>
                <input type="text" class="form-control" name="designation" [(ngModel)]="employee.designation" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Department</label>
                <input type="text" class="form-control" name="department" [(ngModel)]="employee.department" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Salary</label>
              <input type="number" class="form-control" name="salary" [(ngModel)]="employee.salary" required min="0">
            </div>

            <div class="mb-4 p-3 border rounded bg-light">
              <label class="form-label fw-bold">Update Photo (Optional)</label>
              <p class="text-muted small mb-2">Only upload a file if you want to replace the current photo.</p>
              <input type="file" class="form-control" accept="image/*" (change)="onFileSelected($event)">
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold" [disabled]="employeeForm.invalid">
              Update Employee
            </button>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
