<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="text-center mb-4">Create an Account</h3>

          <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

          <form (ngSubmit)="onSubmit()" #signupForm="ngForm">
            
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input 
                type="text" 
                class="form-control" 
                id="username" 
                name="username" 
                [(ngModel)]="user.username" 
                required 
                #username="ngModel">
              <div *ngIf="username.invalid && username.touched" class="text-danger small mt-1">
                Username is required.
              </div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input 
                type="email" 
                class="form-control" 
                id="email" 
                name="email" 
                [(ngModel)]="user.email" 
                required 
                email 
                #email="ngModel">
              <div *ngIf="email.invalid && email.touched" class="text-danger small mt-1">
                A valid email is required.
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input 
                type="password" 
                class="form-control" 
                id="password" 
                name="password" 
                [(ngModel)]="user.password" 
                required 
                minlength="6"
                #password="ngModel">
              <div *ngIf="password.invalid && password.touched" class="text-danger small mt-1">
                Password must be at least 6 characters.
              </div>
            </div>

            <button 
              type="submit" 
              class="btn btn-primary w-100 mt-3" 
              [disabled]="signupForm.invalid">
              Sign Up
            </button>

          </form>

          <div class="text-center mt-3">
            <p class="mb-0">Already have an account? <a routerLink="/login">Login here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
