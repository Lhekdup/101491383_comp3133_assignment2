<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Employee List</h2>
    <a routerLink="/add-employee" class="btn btn-primary">Add Employee</a>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover table-striped mb-0">
          <thead class="table-dark">
            <tr>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Email</th>
              <th>Department</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="employees.length === 0">
              <td colspan="5" class="text-center py-4">No employees found. Click "Add Employee" to create one!</td>
            </tr>
            
            <tr *ngFor="let emp of employees">
              <td>{{ emp.first_name }}</td>
              <td>{{ emp.last_name }}</td>
              <td>{{ emp.email }}</td>
              <td>{{ emp.department }}</td>
              <td>
                <a [routerLink]="['/view-employee', emp.id]" class="btn btn-sm btn-info me-2 text-white">View</a>
                <a [routerLink]="['/update-employee', emp.id]" class="btn btn-sm btn-warning me-2 text-white">Update</a>
                <button (click)="deleteEmployee(emp.id)" class="btn btn-sm btn-danger">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
