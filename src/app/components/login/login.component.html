<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="text-center mb-4">Login</h3>

          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

          <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input 
                type="email" 
                class="form-control" 
                id="email" 
                name="email" 
                [(ngModel)]="credentials.email" 
                required 
                email 
                #email="ngModel">
              <div *ngIf="email.invalid && email.touched" class="text-danger small mt-1">
                A valid email is required.
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input 
                type="password" 
                class="form-control" 
                id="password" 
                name="password" 
                [(ngModel)]="credentials.password" 
                required 
                #password="ngModel">
              <div *ngIf="password.invalid && password.touched" class="text-danger small mt-1">
                Password is required.
              </div>
            </div>

            <button 
              type="submit" 
              class="btn btn-primary w-100 mt-3" 
              [disabled]="loginForm.invalid">
              Login
            </button>

          </form>

          <div class="text-center mt-3">
            <p class="mb-0">Don't have an account? <a routerLink="/signup">Sign up here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
