<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
          <h4 class="mb-0">Add New Employee</h4>
          <a routerLink="/employees" class="btn btn-sm btn-light">Back to List</a>
        </div>
        <div class="card-body p-4">
          
          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

          <form (ngSubmit)="onSubmit()" #employeeForm="ngForm">
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" name="first_name" [(ngModel)]="employee.first_name" required #fname="ngModel">
                <div *ngIf="fname.invalid && fname.touched" class="text-danger small mt-1">First name is required.</div>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" name="last_name" [(ngModel)]="employee.last_name" required #lname="ngModel">
                <div *ngIf="lname.invalid && lname.touched" class="text-danger small mt-1">Last name is required.</div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" [(ngModel)]="employee.email" required email #email="ngModel">
                <div *ngIf="email.invalid && email.touched" class="text-danger small mt-1">Valid email is required.</div>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Gender</label>
                <select class="form-select" name="gender" [(ngModel)]="employee.gender" required #gender="ngModel">
                  <option value="" disabled>Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
                <div *ngIf="gender.invalid && gender.touched" class="text-danger small mt-1">Gender is required.</div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Designation</label>
                <input type="text" class="form-control" name="designation" [(ngModel)]="employee.designation" required #desig="ngModel">
                <div *ngIf="desig.invalid && desig.touched" class="text-danger small mt-1">Designation is required.</div>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Department</label>
                <input type="text" class="form-control" name="department" [(ngModel)]="employee.department" required #dept="ngModel">
                <div *ngIf="dept.invalid && dept.touched" class="text-danger small mt-1">Department is required.</div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Salary</label>
                <input type="number" class="form-control" name="salary" [(ngModel)]="employee.salary" required min="0" #salary="ngModel">
                <div *ngIf="salary.invalid && salary.touched" class="text-danger small mt-1">Valid salary is required.</div>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Date of Joining</label>
                <input type="date" class="form-control" name="date_of_joining" [(ngModel)]="employee.date_of_joining" required #doj="ngModel">
                <div *ngIf="doj.invalid && doj.touched" class="text-danger small mt-1">Date is required.</div>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label">Employee Photo (Required)</label>
              <input type="file" class="form-control" accept="image/*" (change)="onFileSelected($event)" required #photo="ngModel" ngModel name="photo">
               <div *ngIf="photo.invalid && photo.touched" class="text-danger small mt-1">Photo is required.</div>
            </div>

            <button type="submit" class="btn btn-success w-100" [disabled]="employeeForm.invalid || !employee.employee_photo_base64">
              Save Employee
            </button>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
