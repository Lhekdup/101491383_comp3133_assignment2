<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
      
      <div *ngIf="!employee && !errorMessage" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <div class="card shadow-sm" *ngIf="employee">
        <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
          <h4 class="mb-0">Employee Details</h4>
          <a routerLink="/employees" class="btn btn-sm btn-light">Back to List</a>
        </div>
        
        <div class="card-body p-4">
          <div class="row">
            <div class="col-md-4 text-center mb-4 mb-md-0">
              <img 
                [src]="employee.employee_photo ? employee.employee_photo : 'https://via.placeholder.com/150'" 
                alt="Profile Photo" 
                class="img-fluid rounded-circle border border-3 border-info mb-3"
                style="width: 150px; height: 150px; object-fit: cover;">
              <h5 class="mb-0">{{ employee.first_name }} {{ employee.last_name }}</h5>
              <span class="badge bg-secondary mt-2">{{ employee.designation }}</span>
            </div>
            
            <div class="col-md-8">
              <table class="table table-borderless">
                <tbody>
                  <tr><th style="width: 35%">Email:</th><td>{{ employee.email }}</td></tr>
                  <tr><th>Department:</th><td>{{ employee.department }}</td></tr>
                  <tr><th>Gender:</th><td>{{ employee.gender }}</td></tr>
                  <tr><th>Salary:</th><td>${{ employee.salary }}</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
